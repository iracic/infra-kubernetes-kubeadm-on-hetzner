---
- name: Check for outdated component versions
  debug:
    msg: >-
      WARNING: Kubernetes {{ k8s_version }} is outdated. Current stable is 1.35.
      Update k8s_version in your inventory.
  when: k8s_version is version('1.34', '<')

- name: Check for outdated Calico version
  debug:
    msg: >-
      WARNING: Calico {{ calico_version }} is outdated. Current stable is 3.31.x.
      Update calico_version in your inventory.
  when: calico_version is version('3.31', '<')

- name: Wait for cloud-init to finish
  command: cloud-init status --wait
  changed_when: false
  timeout: 180

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present

- name: Install extra kernel modules package
  apt:
    name: "linux-modules-extra-{{ ansible_facts['kernel'] }}"
    state: present
  ignore_errors: true

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
    - ipip
    - ip_tunnel

- name: Persist kernel modules across reboots
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
      ipip
      ip_tunnel

- name: Set required sysctl parameters
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop:
    - { key: net.bridge.bridge-nf-call-iptables, value: "1" }
    - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { key: net.ipv4.ip_forward, value: "1" }

- name: Disable swap
  command: swapoff -a
  changed_when: false

- name: Remove swap entries from fstab
  lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent
